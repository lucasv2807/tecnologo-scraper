server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # SPA routing - redirect 404s to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache HTML files for short period
        add_header Cache-Control "public, max-age=60" always;
    }
    
    # Cache static assets for longer
    location ~* \.(js|css|svg|jpg|jpeg|png|gif|ico|webp|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }
    
    # Gzip compression
    gzip on;
    gzip_types text/html text/plain text/css text/javascript application/javascript;
    gzip_min_length 1000;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
